:root{
  --bg:#070a12; --panel:#0d1320; --panel2:#111a2b; --line:#1e2a40;
  --ink:#e8eef7; --mut:#8493a8; --mut2:#5e6c80; --acc:#58b6ff; --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:
    radial-gradient(1200px 600px at 80% -10%, #0e1830 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 110%, #0c1426 0%, transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace}
header{padding:34px 28px 10px;max-width:1500px;margin:0 auto}
.brandrow{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
h1{font-family:'Orbitron';font-weight:800;letter-spacing:.14em;font-size:22px;margin:0;
   background:linear-gradient(90deg,#cfe0ee,#58b6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.tag{color:var(--mut);font-size:13px;letter-spacing:.04em}
.sub{color:var(--mut2);font-size:13px;margin:10px 0 0;max-width:660px;line-height:1.5}

.controls{position:sticky;top:0;z-index:30;backdrop-filter:blur(10px);
  background:linear-gradient(180deg,rgba(7,10,18,.92),rgba(7,10,18,.72));
  border-bottom:1px solid var(--line);margin-top:18px}
.controls-in{max-width:1500px;margin:0 auto;padding:14px 28px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.ctl{display:flex;flex-direction:column;gap:7px}
.ctl > label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2)}
.row{display:flex;align-items:center;gap:10px}
.swatches{display:flex;gap:8px;align-items:center}
.sw{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);cursor:pointer;padding:0;transition:transform .12s,box-shadow .12s}
.sw:hover{transform:translateY(-2px)}
.sw[aria-pressed="true"]{box-shadow:0 0 0 2px var(--acc);border-color:var(--acc)}
input[type=color]{width:34px;height:30px;padding:0;border:1px solid var(--line);border-radius:8px;background:none;cursor:pointer}
.hex{width:96px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:7px 9px;font-size:13px}
.hex:focus,.jump:focus{outline:2px solid var(--acc);outline-offset:1px}
.switch{position:relative;display:inline-flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.track{width:46px;height:26px;border-radius:99px;background:var(--panel2);border:1px solid var(--line);position:relative;transition:background .18s,border-color .18s}
.knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,#cdd8e6,#7e8da0);transition:transform .18s}
.switch input{position:absolute;opacity:0;pointer-events:none}
.switch input:checked + .track{background:linear-gradient(90deg,#1d4f7a,#2f8fd6);border-color:#3a86c4}
.switch input:checked + .track .knob{transform:translateX(20px);background:linear-gradient(180deg,#eaf4ff,#9fd2ff)}
.switch .txt{font-size:13px;color:var(--ink)}
.switch .hint{font-size:11px;color:var(--mut2)}
.jump{width:120px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:7px 9px;font-size:13px;letter-spacing:.08em;text-transform:uppercase}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 13px;font-size:13px;cursor:pointer;transition:border-color .15s,background .15s}
.btn:hover{border-color:var(--acc);background:#16243a}
.btn.primary{background:linear-gradient(90deg,#1b80d6,#39a7f0);border-color:#3a9fe0;color:#031424;font-weight:600}
.btn.primary:hover{filter:brightness(1.08)}
.count{margin-left:auto;color:var(--mut2);font-size:12px;letter-spacing:.05em}

main{max-width:1500px;margin:0 auto;padding:22px 28px 90px}
.grid{display:grid;gap:16px}
.grid.size-s{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.grid.size-m{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
.grid.size-l{grid-template-columns:repeat(auto-fill,minmax(400px,1fr))}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{background:var(--panel);color:var(--mut);border:0;border-right:1px solid var(--line);padding:7px 12px;font-size:12.5px;cursor:pointer;transition:background .14s,color .14s;font-family:inherit}
.seg button:last-child{border-right:0}
.seg button:hover{color:var(--ink)}
.seg button[aria-pressed="true"]{background:#16243a;color:#eaf2fb}
.card{position:relative;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .14s,border-color .14s,box-shadow .14s;outline:none}
.card:hover{transform:translateY(-3px);border-color:#3b6da0;box-shadow:0 12px 32px -14px #000}
.card:focus-visible{box-shadow:0 0 0 2px var(--acc)}
.card .key{position:absolute;top:10px;left:10px;font-size:13px;letter-spacing:.12em;background:rgba(4,8,16,.62);border:1px solid rgba(255,255,255,.08);color:#dfeaf6;padding:4px 9px;border-radius:7px;backdrop-filter:blur(3px);z-index:2;opacity:0;transition:opacity .16s}
.card .meta{position:absolute;bottom:0;left:0;right:0;font-size:11.5px;letter-spacing:.03em;color:#c8d4e2;padding:20px 11px 9px;background:linear-gradient(180deg,transparent,rgba(2,5,11,.5));display:flex;justify-content:space-between;gap:6px;z-index:2;pointer-events:none;opacity:0;transition:opacity .16s}
.card:hover .key,.card:focus-visible .key,.card:hover .meta,.card:focus-visible .meta{opacity:1}
.card .meta b{font-weight:600;color:#eaf2fb}
.card canvas{width:100%;height:auto;display:block;min-height:60px}
.swatchdot{width:9px;height:9px;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:4px;border:1px solid rgba(255,255,255,.25)}

.modal{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:28px;background:rgba(3,6,12,.72);backdrop-filter:blur(6px)}
.modal.open{display:flex}
.dialog{width:min(980px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 80px -30px #000}
.dlg-top{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line)}
.dlg-key{font-size:20px;letter-spacing:.14em;color:#eaf2fb}
.dlg-names{font-size:12.5px;color:var(--mut)}
.dlg-x{margin-left:auto;background:none;border:1px solid var(--line);color:var(--mut);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;line-height:1}
.dlg-x:hover{color:var(--ink);border-color:var(--acc)}
.preview{padding:26px 22px;display:flex;align-items:center;justify-content:center}
.preview canvas{width:100%;height:auto;max-height:52vh;object-fit:contain}
.dlg-bot{display:flex;align-items:center;gap:12px;padding:14px 20px 20px;border-top:1px solid var(--line);flex-wrap:wrap}
.pair{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--mut)}
.gswatch{width:46px;height:18px;border-radius:5px;border:1px solid var(--line)}
.spacer{flex:1}
/* custom color pickers */
.picklab{font-size:11px;letter-spacing:.1em;color:var(--mut2)}
.pick{display:inline-flex;align-items:center;gap:6px}
/* favorites bar */
.favbar{max-width:1500px;margin:0 auto;padding:10px 28px 14px;display:flex;align-items:center;gap:12px}
.favlabel{font-size:12px;letter-spacing:.06em;color:#ffd76a;white-space:nowrap}
.favchips{flex:1;display:flex;flex-wrap:wrap;gap:7px;align-items:center;min-height:26px}
.favhint{font-size:12px;color:var(--mut2)}
.chip{display:inline-flex;align-items:center;gap:6px;background:#16243a;border:1px solid var(--line);color:#eaf2fb;
  font-size:12.5px;letter-spacing:.06em;padding:3px 6px 3px 9px;border-radius:7px;cursor:pointer;font-family:ui-monospace,Menlo,monospace}
.chip:hover{border-color:var(--acc)}
.chip b{font-weight:600}
.chip .rm{border:0;background:none;color:var(--mut);cursor:pointer;font-size:14px;line-height:1;padding:0 2px}
.chip .rm:hover{color:#ff7a7a}
/* per-tile favorite button */
.card .fav{position:absolute;top:8px;right:8px;z-index:3;width:30px;height:30px;border-radius:8px;
  background:rgba(4,8,16,.62);border:1px solid rgba(255,255,255,.1);color:#cdd8e6;cursor:pointer;
  font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);
  opacity:0;transition:opacity .16s,color .12s,transform .12s}
.card:hover .fav,.card:focus-within .fav,.card .fav.on{opacity:1}
.card .fav:hover{transform:scale(1.08)}
.card .fav.on{color:#ffd76a;border-color:#caa83a}
@media (max-width:560px){.controls-in{gap:14px}.count{display:none}header{padding:22px 16px 8px}main{padding:16px}.controls-in{padding:12px 16px}.favbar{padding:10px 16px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="brandrow"><h1>ARCDROP</h1><span class="tag mono">// COLOR LAB</span></div>
  <p class="sub">Your logo, recolored. Each tile is the real mark split between ARC and DROP, with a short code you can recall. Tap one to preview it large and save a PNG. The background applies everywhere.</p>
</header>

<div class="controls">
  <div class="controls-in">
    <div class="ctl">
      <label>Mode</label>
      <div class="seg" id="modeSeg" role="group" aria-label="Mode">
        <button data-mode="palette" aria-pressed="true">Palette</button>
        <button data-mode="custom" aria-pressed="false">Custom</button>
      </div>
    </div>
    <div class="ctl">
      <label>Background</label>
      <div class="row">
        <div class="swatches" id="swatches"></div>
        <input type="color" id="bgpick" value="#05070d" aria-label="Custom background color">
        <input class="hex mono" id="bghex" value="#05070d" aria-label="Background hex" maxlength="7">
      </div>
    </div>
    <div class="ctl" id="paletteCtl">
      <label>ARC / DROP color</label>
      <label class="switch">
        <input type="checkbox" id="diff" checked>
        <span class="track"><span class="knob"></span></span>
        <span><span class="txt">ARC and DROP differ</span><br><span class="hint">off = both halves share one color</span></span>
      </label>
    </div>
    <div class="ctl" id="customCtl" style="display:none">
      <label>Your colors &mdash; generates similar shades</label>
      <div class="row">
        <span class="picklab">ARC</span>
        <span class="pick"><input type="color" id="arcPick" value="#1488e0" aria-label="ARC color"><input class="hex mono" id="arcHexIn" value="#1488e0" maxlength="7"></span>
        <span class="picklab">DROP</span>
        <span class="pick"><input type="color" id="dropPick" value="#ec2f43" aria-label="DROP color"><input class="hex mono" id="dropHexIn" value="#ec2f43" maxlength="7"></span>
      </div>
    </div>
    <div class="ctl">
      <label>Gradient style</label>
      <div class="seg" id="styleSeg" role="group" aria-label="Gradient style">
        <button data-style="smooth" aria-pressed="false">Smooth</button>
        <button data-style="chrome" aria-pressed="true">Chrome</button>
        <button data-style="vivid" aria-pressed="false">Vivid</button>
      </div>
    </div>
    <div class="ctl">
      <label>Size</label>
      <div class="seg" id="sizeSeg" role="group" aria-label="Tile size">
        <button data-size="s" aria-pressed="false">S</button>
        <button data-size="m" aria-pressed="false">M</button>
        <button data-size="l" aria-pressed="true">L</button>
      </div>
    </div>
    <div class="ctl">
      <label>Subtitle color</label>
      <div class="seg" id="subSeg" role="group" aria-label="Subtitle color">
        <button data-sub="word" aria-pressed="true">ARC word</button>
        <button data-sub="arc" aria-pressed="false">All ARC</button>
        <button data-sub="drop" aria-pressed="false">All DROP</button>
        <button data-sub="title" aria-pressed="false">Title split</button>
      </div>
    </div>
    <div class="ctl">
      <label>Jump to code</label>
      <div class="row">
        <input class="jump mono" id="jump" placeholder="e.g. C3" aria-label="Jump to code">
        <button class="btn" id="jumpbtn">Open</button>
      </div>
    </div>
    <span class="count mono" id="count"></span>
  </div>
  <div class="favbar" id="favbar">
    <span class="favlabel">★ Favorites</span>
    <div class="favchips" id="favchips"><span class="favhint">Hover a tile and tap ★ to collect codes here</span></div>
    <button class="btn" id="favCopy">Copy list</button>
    <button class="btn" id="favClear">Clear</button>
  </div>
</div>

<main><div class="grid size-l" id="grid"></div></main>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Colorway preview">
  <div class="dialog">
    <div class="dlg-top">
      <span class="dlg-key mono" id="mKey">—</span>
      <span class="dlg-names" id="mNames"></span>
      <button class="dlg-x" id="mClose" aria-label="Close">×</button>
    </div>
    <div class="preview" id="mPrev"></div>
    <div class="dlg-bot">
      <div class="pair">ARC <span class="gswatch" id="mArc"></span></div>
      <div class="pair">DROP <span class="gswatch" id="mDrop"></span></div>
      <div class="pair">BG <span class="gswatch" id="mBg"></span> <span class="mono" id="mBgHex"></span></div>
      <span class="spacer"></span>
      <button class="btn" id="mFav">★ Favorite</button>
      <button class="btn" id="mCopy">Copy code</button>
      <button class="btn primary" id="mSave">Save PNG</button>
    </div>
  </div>
</div>

function hexToRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgbToHex(r,g,b){const c=x=>Math.max(0,Math.min(255,x|0)).toString(16).padStart(2,'0');return '#'+c(r)+c(g)+c(b);}
function mixHex(a,b,t){const x=hexToRgb(a),y=hexToRgb(b);return rgbToHex(x[0]+(y[0]-x[0])*t,x[1]+(y[1]-x[1])*t,x[2]+(y[2]-x[2])*t);}
function shade(stops,dir){const tgt=dir<0?'#06121f':'#ffffff';const t=Math.abs(dir);return stops.map(s=>mixHex(s,tgt,t));}
function gradCss(stops,offs){
  const parts=stops.map((s,i)=> offs?`${s} ${Math.round(offs[i]*100)}%`:s);
  return `linear-gradient(180deg,${parts.join(',')})`;
}

/* 256-entry color LUT sampled along stops at their offsets */
function buildLUT(stops,offs){
  const cols=stops.map(hexToRgb); const n=stops.length;
  const O = offs || cols.map((_,i)=>i/(n-1));
  const lut=new Float32Array(256*3);
  for(let i=0;i<256;i++){
    const t=i/255; let r,g,b;
    let k=0; while(k<n-1 && t>O[k+1]) k++;
    if(k>=n-1){[r,g,b]=cols[n-1];}
    else{const span=(O[k+1]-O[k])||1e-6;const f=(t-O[k])/span;const c0=cols[k],c1=cols[k+1];
      r=c0[0]+(c1[0]-c0[0])*f; g=c0[1]+(c1[1]-c0[1])*f; b=c0[2]+(c1[2]-c0[2])*f;}
    lut[i*3]=r;lut[i*3+1]=g;lut[i*3+2]=b;
  }
  return lut;
}

/* HSL helpers for the Vivid style */
function rgb2hsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>0.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h*=60;}
  return [h,s,l];}
function hsl2rgb(h,s,l){h=((h%360)+360)%360;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
  let r,g,b;if(h<60)[r,g,b]=[c,x,0];else if(h<120)[r,g,b]=[x,c,0];else if(h<180)[r,g,b]=[0,c,x];
  else if(h<240)[r,g,b]=[0,x,c];else if(h<300)[r,g,b]=[x,0,c];else[r,g,b]=[c,0,x];
  return [Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];}

/* gradient-style options: turn a family's base chrome stops into different looks */
function styledGradient(f,style){
  if(style==='smooth'){
    return {stops:[f.stops[0],f.stops[1],f.stops[4],f.stops[5]], offs:[0,0.34,0.68,1]};
  }
  if(style==='vivid'){
    const n=f.stops.length;
    const stops=f.stops.map((hx,i)=>{
      const rgb=hexToRgb(hx); let [h,s,l]=rgb2hsl(rgb[0],rgb[1],rgb[2]);
      s=Math.min(1, s*1.4 + 0.06);
      h=h+(i/(n-1)-0.5)*22;          // gentle hue travel for iridescence
      if(i===3) l=Math.min(1,l*1.05); // lift the chrome band
      const o=hsl2rgb(h,s,l); return rgbToHex(o[0],o[1],o[2]);
    });
    return {stops, offs:f.offs};
  }
  return {stops:f.stops, offs:f.offs}; // chrome (default)
}

/* source image -> {data,w,h} at a given width */
let MASK_IMG=null, SRC_FULL=null, SRC_THUMB=null;
function makeSource(img,w){
  const h=Math.round(w*img.height/img.width);
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
  return {data:ctx.getImageData(0,0,w,h).data, w, h};
}

/* core recolor -> ImageData */
function recolor(src,arcLUT,dropLUT){
  const {w,h,data}=src;
  const out=new Uint8ClampedArray(w*h*4);
  const wy0=FWY0*h, wy1=FWY1*h, band=FBAND*w, yCut=FTAGCUT*h;
  const rowA=new Float32Array(h*3), rowD=new Float32Array(h*3);
  for(let y=0;y<h;y++){
    let t = y<=wy1 ? (y-wy0)/(wy1-wy0) : TAG_N;
    t = t<0?0:t>1?1:t;
    const ci=(t*255)|0;
    rowA[y*3]=arcLUT[ci*3];rowA[y*3+1]=arcLUT[ci*3+1];rowA[y*3+2]=arcLUT[ci*3+2];
    rowD[y*3]=dropLUT[ci*3];rowD[y*3+1]=dropLUT[ci*3+1];rowD[y*3+2]=dropLUT[ci*3+2];
  }
  // wordmark split; tagline split depends on the chosen subtitle mode
  function mkfx(sp){const a=new Float32Array(w);for(let x=0;x<w;x++){let r=(x-(sp-band))/(2*band);r=r<0?0:r>1?1:r;a[x]=r*r*(3-2*r);}return a;}
  const fxW=mkfx(FSP*w);
  let fxTag;
  const sub=state.subtitle;
  if(sub==='arc'){ fxTag=new Float32Array(w); }                  // all ARC color
  else if(sub==='drop'){ fxTag=new Float32Array(w).fill(1); }    // all DROP color
  else if(sub==='title'){ fxTag=fxW; }                           // same split as title
  else { fxTag=mkfx(FTSP*w); }                                   // 'word' = only "ARC" word
  // flat (gradient-free) acronym letters: bright, uniform tone of the side's color
  const fi=56;
  const fA=[arcLUT[fi*3],arcLUT[fi*3+1],arcLUT[fi*3+2]];
  const fD=[dropLUT[fi*3],dropLUT[fi*3+1],dropLUT[fi*3+2]];
  const isFlat=new Uint8Array(w);
  for(const r of FLAT_RANGES){const a=Math.floor(r[0]*w),bb=Math.ceil(r[1]*w);for(let x=a;x<=bb&&x<w;x++)isFlat[x]=1;}
  let i=0;
  for(let y=0;y<h;y++){
    const ar=rowA[y*3],ag=rowA[y*3+1],ab=rowA[y*3+2];
    const dr=rowD[y*3],dg=rowD[y*3+1],db=rowD[y*3+2];
    const tagline = y>=yCut;
    const fx = tagline ? fxTag : fxW;
    for(let x=0;x<w;x++){
      const f=fx[x], g1=1-f;
      const a=data[i+3];
      if(tagline && isFlat[x]){          // acronym letter: flat, no sheen
        out[i]  = fA[0]*g1+fD[0]*f;
        out[i+1]= fA[1]*g1+fD[1]*f;
        out[i+2]= fA[2]*g1+fD[2]*f;
        out[i+3]= a;
      } else {
        const gray=data[i]; let sheen=0.42+0.74*(gray/255); if(sheen>1.15)sheen=1.15;
        out[i]   = (ar*g1+dr*f)*sheen;
        out[i+1] = (ag*g1+dg*f)*sheen;
        out[i+2] = (ab*g1+db*f)*sheen;
        out[i+3] = a;
      }
      i+=4;
    }
  }
  return new ImageData(out,w,h);
}

/* state */
let state={bg:'#05070d',diff:true,style:'chrome',size:'l',mode:'palette',subtitle:'word',arcPick:'#1488e0',dropPick:'#ec2f43'};
let VARIANTS=[];
let favs=[]; // ordered list of favorited codes

function clamp01(v){return v<0?0:v>1?1:v;}
/* turn one picked color into a 6-stop chrome gradient (the pick is the dominant mid tone) */
function chromeFromBase(hex){
  const rgb=hexToRgb(hex); let [h,s,l]=rgb2hsl(rgb[0],rgb[1],rgb[2]);
  s=Math.max(s,0.05);
  const mk=(ll,ss)=>{const o=hsl2rgb(h,clamp01(ss),clamp01(ll));return rgbToHex(o[0],o[1],o[2]);};
  const stops=[
    mk(Math.min(0.97,l+0.40), s*0.55),
    mk(Math.min(0.86,l+0.16), s*0.95),
    mk(Math.max(0.18,l-0.20), Math.min(1,s*1.12)),
    mk(Math.min(0.93,l+0.30), s*0.7),
    mk(l, s),
    mk(Math.max(0.10,l-0.36), Math.min(1,s*1.05))
  ];
  return {stops, offs:OFF6};
}
/* a set of 9 "similar shades" around a base: 3 tones x 3 hue nudges */
function shadeSet(hex){
  const rgb=hexToRgb(hex); const [h,s,l]=rgb2hsl(rgb[0],rgb[1],rgb[2]);
  const tones=[{dl:+0.13,ds:-0.05},{dl:0,ds:0},{dl:-0.13,ds:+0.05}];
  const hues=[-16,0,16]; const out=[];
  for(const t of tones)for(const hd of hues){
    const o=hsl2rgb(h+hd, clamp01(s+t.ds), clamp01(l+t.dl));
    out.push(rgbToHex(o[0],o[1],o[2]));
  }
  return out;
}
function buildVariants(){
  VARIANTS=[]; const st=state.style;
  if(state.mode==='custom'){
    const arcShades=shadeSet(state.arcPick), dropShades=shadeSet(state.dropPick);
    const L='ABCDEFGHI';
    for(let r=0;r<arcShades.length;r++)for(let c=0;c<dropShades.length;c++){
      const sa=styledGradient(chromeFromBase(arcShades[r]),st);
      const sd=styledGradient(chromeFromBase(dropShades[c]),st);
      VARIANTS.push({key:L[r]+(c+1),arc:sa.stops,drop:sd.stops,aOff:sa.offs,dOff:sd.offs,
        arcName:arcShades[r].toUpperCase(),dropName:dropShades[c].toUpperCase(),
        arcLUT:buildLUT(sa.stops,sa.offs),dropLUT:buildLUT(sd.stops,sd.offs)});
    }
    return;
  }
  if(state.diff){
    for(let r=0;r<FAMILIES.length;r++)for(let c=0;c<FAMILIES.length;c++){
      const af=FAMILIES[r],df=FAMILIES[c];
      const sa=styledGradient(af,st), sd=styledGradient(df,st);
      const arc=sa.stops, aOff=sa.offs;
      let drop=sd.stops, dOff=sd.offs;
      if(r===c) drop=shade(drop,-0.30);
      VARIANTS.push({key:af.code+(c+1),arc,drop,aOff,dOff,arcName:af.name,dropName:(r===c?df.name+' (deep)':df.name),
        arcLUT:buildLUT(arc,aOff),dropLUT:buildLUT(drop,dOff)});
    }
  } else {
    for(let r=0;r<FAMILIES.length;r++){const f=FAMILIES[r];const s=styledGradient(f,st);
      VARIANTS.push({key:f.code,arc:s.stops,drop:s.stops,aOff:s.offs,dOff:s.offs,arcName:f.name,dropName:f.name,
        arcLUT:buildLUT(s.stops,s.offs),dropLUT:buildLUT(s.stops,s.offs)});}
  }
}

const grid=document.getElementById('grid'), countEl=document.getElementById('count');
function dot(c){return `<span class="swatchdot" style="background:${c}"></span>`;}
let io=null;
function paintCard(card){
  if(card.dataset.painted) return;
  const v=VARIANTS[+card.dataset.i];
  const cv=card.querySelector('canvas');
  cv.getContext('2d').putImageData(recolor(SRC_THUMB,v.arcLUT,v.dropLUT),0,0);
  card.dataset.painted='1';
}
function renderGrid(){
  buildVariants();
  if(io) io.disconnect();
  grid.innerHTML='';
  const frag=document.createDocumentFragment();
  VARIANTS.forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='card';card.tabIndex=0;card.dataset.i=i;card.dataset.key=v.key;
    card.style.background=state.bg;
    const cv=document.createElement('canvas');cv.width=SRC_THUMB.w;cv.height=SRC_THUMB.h;
    card.appendChild(cv);
    const key=document.createElement('span');key.className='key mono';key.textContent=v.key;card.appendChild(key);
    const fav=document.createElement('button');fav.className='fav'+(favs.includes(v.key)?' on':'');
    fav.dataset.fav=v.key;fav.title='Favorite';fav.setAttribute('aria-label','Favorite '+v.key);
    fav.textContent=favs.includes(v.key)?'★':'☆';card.appendChild(fav);
    const meta=document.createElement('span');meta.className='meta';
    meta.innerHTML=`<span>${dot(v.arc[1])}<b>${v.arcName}</b></span><span>${dot(v.drop[1])}<b>${v.dropName}</b></span>`;
    card.appendChild(meta);
    frag.appendChild(card);
  });
  grid.appendChild(frag);
  countEl.textContent=VARIANTS.length+' colorways';
  io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ paintCard(e.target); io.unobserve(e.target); } });
  },{root:null, rootMargin:'500px 0px'});
  [...grid.children].forEach(c=>io.observe(c));
}

/* modal */
const modal=document.getElementById('modal'),mPrev=document.getElementById('mPrev');
let current=null;
function openModal(i){
  const v=VARIANTS[i];current=v;
  document.getElementById('mKey').textContent=v.key;
  document.getElementById('mNames').textContent=`ARC ${v.arcName}  ·  DROP ${v.dropName}`;
  document.getElementById('mArc').style.background=gradCss(v.arc,v.aOff);
  document.getElementById('mDrop').style.background=gradCss(v.drop,v.dOff);
  document.getElementById('mBg').style.background=state.bg;
  document.getElementById('mBgHex').textContent=state.bg.toUpperCase();
  mPrev.style.background=state.bg;
  const cv=document.createElement('canvas');cv.width=SRC_FULL.w;cv.height=SRC_FULL.h;
  cv.getContext('2d').putImageData(recolor(SRC_FULL,v.arcLUT,v.dropLUT),0,0);
  mPrev.innerHTML='';mPrev.appendChild(cv);
  updateModalFav();
  modal.classList.add('open');
}
function closeModal(){modal.classList.remove('open');current=null;}
document.getElementById('mClose').onclick=closeModal;
modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
grid.addEventListener('click',e=>{
  const fb=e.target.closest('.fav');
  if(fb){e.stopPropagation();toggleFav(fb.dataset.fav);return;}
  const c=e.target.closest('.card');if(c)openModal(+c.dataset.i);
});
grid.addEventListener('keydown',e=>{const c=e.target.closest('.card');if(c&&(e.key==='Enter'||e.key===' ')){e.preventDefault();openModal(+c.dataset.i);}});

/* ---------- favorites ---------- */
const favchips=document.getElementById('favchips');
function setFavButtons(code){
  [...grid.querySelectorAll('.fav[data-fav="'+code+'"]')].forEach(b=>{
    const on=favs.includes(code); b.classList.toggle('on',on); b.textContent=on?'★':'☆';
  });
}
function toggleFav(code){
  const k=favs.indexOf(code);
  if(k>=0) favs.splice(k,1); else favs.push(code);
  setFavButtons(code); renderFavs();
  if(current&&current.key===code) updateModalFav();
}
function renderFavs(){
  if(!favs.length){favchips.innerHTML='<span class="favhint">Hover a tile and tap ★ to collect codes here</span>';return;}
  favchips.innerHTML='';
  favs.forEach(code=>{
    const chip=document.createElement('span');chip.className='chip';chip.dataset.code=code;
    chip.innerHTML=`<b>${code}</b><button class="rm" title="Remove" aria-label="Remove ${code}">×</button>`;
    favchips.appendChild(chip);
  });
}
favchips.addEventListener('click',e=>{
  const rm=e.target.closest('.rm');
  const chip=e.target.closest('.chip'); if(!chip)return;
  if(rm){toggleFav(chip.dataset.code);return;}
  const i=VARIANTS.findIndex(v=>v.key===chip.dataset.code); if(i>=0)openModal(i);
});
document.getElementById('favCopy').onclick=async()=>{
  if(!favs.length)return;
  let text=favs.join(', ');
  if(state.mode==='custom') text=`ARC ${state.arcPick} / DROP ${state.dropPick} — ${text}`;
  try{await navigator.clipboard.writeText(text);
    const b=document.getElementById('favCopy');const t=b.textContent;b.textContent='Copied!';setTimeout(()=>b.textContent=t,1200);}catch(_){}
};
document.getElementById('favClear').onclick=()=>{const old=favs.slice();favs=[];old.forEach(setFavButtons);renderFavs();updateModalFav();};

document.getElementById('mCopy').onclick=async()=>{
  if(!current)return;
  try{await navigator.clipboard.writeText(current.key);
    const b=document.getElementById('mCopy');const t=b.textContent;b.textContent='Copied '+current.key;setTimeout(()=>b.textContent=t,1200);}catch(_){}
};
const mFav=document.getElementById('mFav');
function updateModalFav(){const on=current&&favs.includes(current.key);
  mFav.classList.toggle('on',!!on);mFav.textContent=on?'★ Favorited':'☆ Favorite';
  mFav.style.color=on?'#ffd76a':'';mFav.style.borderColor=on?'#caa83a':'';}
mFav.onclick=()=>{if(current)toggleFav(current.key);};

/* save PNG (bg baked, 2x) */
document.getElementById('mSave').onclick=()=>{
  if(!current)return;const v=current;
  const base=document.createElement('canvas');base.width=SRC_FULL.w;base.height=SRC_FULL.h;
  base.getContext('2d').putImageData(recolor(SRC_FULL,v.arcLUT,v.dropLUT),0,0);
  const S=2;const ex=document.createElement('canvas');ex.width=SRC_FULL.w*S;ex.height=SRC_FULL.h*S;
  const ctx=ex.getContext('2d');ctx.fillStyle=state.bg;ctx.fillRect(0,0,ex.width,ex.height);
  ctx.imageSmoothingQuality='high';ctx.drawImage(base,0,0,ex.width,ex.height);
  ex.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);
    a.download=`arcdrop_${v.key}.png`;document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500);},'image/png');
};

/* controls */
const PRESETS=['#05070d','#000000','#0d1b2a','#1a1a1a','#10131a','#ffffff','#f2f4f7','#101820'];
const swWrap=document.getElementById('swatches');
PRESETS.forEach(p=>{const b=document.createElement('button');b.className='sw';b.style.background=p;b.dataset.c=p;
  b.setAttribute('aria-pressed',p===state.bg?'true':'false');b.title=p;b.onclick=()=>setBg(p);swWrap.appendChild(b);});
const bgpick=document.getElementById('bgpick'),bghex=document.getElementById('bghex');
function setBg(hex){
  if(!/^#?[0-9a-fA-F]{6}$/.test(hex))return; if(hex[0]!=='#')hex='#'+hex;
  state.bg=hex.toLowerCase();bgpick.value=state.bg;bghex.value=state.bg;
  [...swWrap.children].forEach(s=>s.setAttribute('aria-pressed',s.dataset.c===state.bg?'true':'false'));
  [...grid.children].forEach(c=>c.style.background=state.bg);
  if(modal.classList.contains('open')&&current){mPrev.style.background=state.bg;
    document.getElementById('mBg').style.background=state.bg;document.getElementById('mBgHex').textContent=state.bg.toUpperCase();}
}
bgpick.oninput=e=>setBg(e.target.value);
bghex.onchange=e=>setBg(e.target.value.trim());
document.getElementById('diff').onchange=e=>{state.diff=e.target.checked;renderGrid();};

const styleSeg=document.getElementById('styleSeg');
styleSeg.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  state.style=b.dataset.style;
  [...styleSeg.children].forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false'));
  renderGrid();
  if(modal.classList.contains('open')&&current){const i=VARIANTS.findIndex(v=>v.key===current.key);if(i>=0)openModal(i);}
});
const sizeSeg=document.getElementById('sizeSeg');
sizeSeg.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  state.size=b.dataset.size;
  [...sizeSeg.children].forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false'));
  grid.className='grid size-'+state.size;
});
function refreshModalIfOpen(){if(modal.classList.contains('open')&&current){const i=VARIANTS.findIndex(v=>v.key===current.key);if(i>=0)openModal(i);else closeModal();}}

const modeSeg=document.getElementById('modeSeg'), paletteCtl=document.getElementById('paletteCtl'), customCtl=document.getElementById('customCtl');
modeSeg.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  state.mode=b.dataset.mode;
  [...modeSeg.children].forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false'));
  const custom=state.mode==='custom';
  paletteCtl.style.display=custom?'none':'';
  customCtl.style.display=custom?'':'none';
  renderGrid(); refreshModalIfOpen();
});
const subSeg=document.getElementById('subSeg');
subSeg.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  state.subtitle=b.dataset.sub;
  [...subSeg.children].forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false'));
  renderGrid(); refreshModalIfOpen();
});
const arcPick=document.getElementById('arcPick'),arcHexIn=document.getElementById('arcHexIn');
const dropPick=document.getElementById('dropPick'),dropHexIn=document.getElementById('dropHexIn');
function setPick(which,hex){
  if(!/^#?[0-9a-fA-F]{6}$/.test(hex))return; if(hex[0]!=='#')hex='#'+hex; hex=hex.toLowerCase();
  if(which==='arc'){state.arcPick=hex;arcPick.value=hex;arcHexIn.value=hex;}
  else{state.dropPick=hex;dropPick.value=hex;dropHexIn.value=hex;}
  if(state.mode==='custom'){renderGrid();refreshModalIfOpen();}
}
arcPick.oninput=e=>setPick('arc',e.target.value);
arcHexIn.onchange=e=>setPick('arc',e.target.value.trim());
dropPick.oninput=e=>setPick('drop',e.target.value);
dropHexIn.onchange=e=>setPick('drop',e.target.value.trim());

function doJump(){const q=document.getElementById('jump').value.trim().toUpperCase();if(!q)return;
  const i=VARIANTS.findIndex(v=>v.key===q);
  if(i>=0)openModal(i);else{const j=document.getElementById('jump');j.style.borderColor='#c44';setTimeout(()=>j.style.borderColor='',900);}}
document.getElementById('jumpbtn').onclick=doJump;
document.getElementById('jump').addEventListener('keydown',e=>{if(e.key==='Enter')doJump();});

/* boot */
function boot(){
  MASK_IMG=new Image();
  MASK_IMG.onload=()=>{
    SRC_FULL=makeSource(MASK_IMG,MASK_IMG.width);
    SRC_THUMB=makeSource(MASK_IMG,560);
    renderGrid();
  };
  MASK_IMG.src='data:image/png;base64,'+MASK_B64;
}
boot();
</script>
